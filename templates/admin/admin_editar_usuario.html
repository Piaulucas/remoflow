{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-person-gear me-2"></i>Editar Usuário</h1>
  <p>Altere os dados do usuário</p>
</div>

<div class="card" style="max-width:520px;">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Nome completo <span class="text-danger">*</span></label>
        <input type="text" name="nome" class="form-control"
               value="{{ usuario.nome }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">CPF <span class="text-danger">*</span></label>
        <input type="text" name="cpf" id="cpfInput" class="form-control"
               value="{{ usuario.cpf }}" inputmode="numeric" maxlength="11" required>
        <div class="form-text">Somente números, sem pontos ou traços.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Perfil <span class="text-danger">*</span></label>
        <select name="perfil" class="form-select" required>
          {% for p in perfis %}
          <option value="{{ p }}" {% if usuario.perfil == p %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="ativo" id="ativoCheck"
                 {% if usuario.ativo %}checked{% endif %}>
          <label class="form-check-label" for="ativoCheck">Usuário ativo</label>
        </div>
      </div>
      <div class="d-flex gap-2">
        <a href="{{ url_for('admin.admin_usuarios') }}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('cpfInput').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '');
  });
</script>
{% endblock %}
