<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RemoFlow — Primeiro Acesso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border: none;
    }
    .brand { font-size: 1.6rem; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
    .brand span { color: #1a56db; }
    .form-label { font-size: 0.8rem; font-weight: 500; color: #374151; }
    .form-control { font-size: 0.875rem; border-color: #d1d5db; border-radius: 8px; padding: 0.6rem 0.75rem; }
    .form-control:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .btn-primary { background: #1a56db; border-color: #1a56db; border-radius: 8px; font-weight: 600; }
    .btn-primary:hover { background: #1245b0; border-color: #1245b0; }
    .alert { font-size: 0.82rem; border-radius: 8px; }
    .notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: #1e40af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-4">
      <div class="brand">Remo<span>Flow</span></div>
      <div class="mt-2 text-muted" style="font-size:0.85rem;">Troca de senha obrigatória</div>
    </div>

    <div class="notice mb-4">
      <i class="bi bi-shield-lock-fill me-1"></i>
      Por segurança, você precisa definir uma nova senha antes de continuar.
    </div>

    {% if erro %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ erro }}
    </div>
    {% endif %}

    <form method="post" id="formSenha">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Nova senha <span class="text-danger">*</span></label>
        <input type="password" name="nova_senha" id="nova_senha" class="form-control"
               placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmar senha <span class="text-danger">*</span></label>
        <input type="password" name="confirmar_senha" id="confirmar_senha" class="form-control"
               placeholder="Repita a senha" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-check-lg me-1"></i>Definir senha e entrar
      </button>
    </form>
  </div>

  <script>
    document.getElementById('formSenha').addEventListener('submit', function(e) {
      const nova = document.getElementById('nova_senha').value;
      const conf = document.getElementById('confirmar_senha').value;
      if (nova.length < 6) {
        e.preventDefault();
        alert('A senha deve ter no mínimo 6 caracteres.');
        return;
      }
      if (nova !== conf) {
        e.preventDefault();
        alert('As senhas não coincidem.');
      }
    });
  </script>
</body>
</html>
