{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1>Cadastros</h1>
  <p>Gerencie as ambulâncias disponíveis</p>
</div>

<div class="row g-3">
  <div class="col-md-6 col-xl-4">
    <div class="card h-100">
      <div class="card-header d-flex align-items-center gap-2">
        <span class="icon bg-secondary bg-opacity-10 text-secondary" style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;">
          <i class="bi bi-truck-front"></i>
        </span>
        <span>Ambulâncias</span>
        <span class="badge bg-secondary ms-auto">{{ ambulancias|length }}</span>
      </div>
      <div class="card-body p-0">
        <div class="p-3 border-bottom bg-light">
          <form method="post" action="{{ url_for('cadastros.add_cadastro') }}" class="d-flex gap-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="nome" class="form-control form-control-sm" placeholder="Adicionar ambulância..." required>
            <button class="btn btn-sm btn-secondary px-3" type="submit">
              <i class="bi bi-plus-lg"></i>
            </button>
          </form>
        </div>
        <ul class="list-group list-group-flush" style="max-height:400px;overflow-y:auto;">
          {% for item in ambulancias %}
          <li class="list-group-item d-flex justify-content-between align-items-center py-2 px-3">
            <span style="font-size:0.82rem;">{{ item }}</span>
            <form method="post" action="{{ url_for('cadastros.delete_cadastro') }}" onsubmit="return confirm('Remover {{ item }}?')">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <input type="hidden" name="nome" value="{{ item }}">
              <button class="btn btn-sm btn-link text-danger p-0 ms-2" type="submit" title="Remover">
                <i class="bi bi-x-lg"></i>
              </button>
            </form>
          </li>
          {% else %}
          <li class="list-group-item text-muted text-center py-3" style="font-size:0.8rem;">Nenhuma ambulância cadastrada</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>
</div>
{% endblock %}
